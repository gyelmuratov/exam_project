{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Products</h1>
    <div class="row g-4">
        {% for product in products %}
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card h-100">
                {% with product.images.first as img %}
                {% if img %}
                <img src="{{ img.image.url }}" class="card-img-top" alt="{{ product.title }}">
                {% endif %}
                {% endwith %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.title }}</h5>
                    <p class="card-text mb-2">${{ product.price }}</p>
                    <a href="{% url 'products:detail' product.pk %}" class="btn btn-primary mt-auto">View</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No products yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
